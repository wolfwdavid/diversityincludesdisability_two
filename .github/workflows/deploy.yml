name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify three pin
        run: node scripts/check-three-pin.mjs
      - name: Contrast gate (A11Y-06)
        run: node scripts/check-contrast.mjs
      - name: Build
        env:
          BASE_PATH: '/${{ github.event.repository.name }}'
        run: pnpm build
      - name: Premium chunk budget + zero-WebGL gate (PREM-03, D-07)
        run: node scripts/check-premium-budget.mjs
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright browser (chromium)
        run: pnpm exec playwright install --with-deps chromium
      - name: Critical E2E gate (QA-01 axe both modes, QA-02 zero-WebGL, toggle smoke — D-08/D-09)
        run: pnpm exec playwright test --grep "@ci"
      - uses: actions/upload-pages-artifact@v5
        with:
          path: build/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
